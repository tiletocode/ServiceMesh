spring:
  application:
    name: product-service-test

  datasource:
    url: jdbc:h2:mem:product_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=value
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  cache:
    type: none

  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    discovery:
      enabled: false

eureka:
  client:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health
