spring:
  application:
    name: member-service-test

  datasource:
    url: jdbc:h2:mem:member_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=value
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  cloud:
    discovery:
      enabled: false

eureka:
  client:
    enabled: false

jwt:
  secret: test-secret-key-must-be-very-long-at-least-256-bits-for-security-ok
  expiration-ms: 3600000

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    org.springframework.security: DEBUG
