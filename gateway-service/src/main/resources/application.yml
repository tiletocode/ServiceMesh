server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        # ── Admin Reset Routes (specific paths first) ───────────
        # nginx의 RewritePath: /api/v1/admin/reset/{service} → /api/v1/admin/reset
        - id: admin-reset-member
          uri: http://member-service:8081
          predicates:
            - Path=/api/v1/admin/reset/member
          filters:
            - RewritePath=/api/v1/admin/reset/member, /api/v1/admin/reset

        - id: admin-reset-product
          uri: http://product-service:8082
          predicates:
            - Path=/api/v1/admin/reset/product
          filters:
            - RewritePath=/api/v1/admin/reset/product, /api/v1/admin/reset

        - id: admin-reset-order
          uri: http://order-service:8083
          predicates:
            - Path=/api/v1/admin/reset/order
          filters:
            - RewritePath=/api/v1/admin/reset/order, /api/v1/admin/reset

        - id: admin-reset-payment
          uri: http://payment-service:8084
          predicates:
            - Path=/api/v1/admin/reset/payment
          filters:
            - RewritePath=/api/v1/admin/reset/payment, /api/v1/admin/reset

        - id: admin-reset-shipping
          uri: http://shipping-service:8085
          predicates:
            - Path=/api/v1/admin/reset/shipping
          filters:
            - RewritePath=/api/v1/admin/reset/shipping, /api/v1/admin/reset

        # ── API Routes ──────────────────────────────────────────
        - id: member-api
          uri: http://member-service:8081
          predicates:
            - Path=/api/v1/members,/api/v1/members/**

        - id: product-api
          uri: http://product-service:8082
          predicates:
            - Path=/api/v1/products,/api/v1/products/**

        - id: order-api
          uri: http://order-service:8083
          predicates:
            - Path=/api/v1/orders,/api/v1/orders/**

        - id: payment-api
          uri: http://payment-service:8084
          predicates:
            - Path=/api/v1/payments,/api/v1/payments/**

        - id: shipping-api
          uri: http://shipping-service:8085
          predicates:
            - Path=/api/v1/shipments,/api/v1/shipments/**

        # ── API Docs (springdoc) ────────────────────────────────
        - id: apidocs-member
          uri: http://member-service:8081
          predicates:
            - Path=/apidocs/member/**
          filters:
            - RewritePath=/apidocs/member/(?<remaining>.*), /${remaining}

        - id: apidocs-product
          uri: http://product-service:8082
          predicates:
            - Path=/apidocs/product/**
          filters:
            - RewritePath=/apidocs/product/(?<remaining>.*), /${remaining}

        - id: apidocs-order
          uri: http://order-service:8083
          predicates:
            - Path=/apidocs/order/**
          filters:
            - RewritePath=/apidocs/order/(?<remaining>.*), /${remaining}

        - id: apidocs-payment
          uri: http://payment-service:8084
          predicates:
            - Path=/apidocs/payment/**
          filters:
            - RewritePath=/apidocs/payment/(?<remaining>.*), /${remaining}

        - id: apidocs-shipping
          uri: http://shipping-service:8085
          predicates:
            - Path=/apidocs/shipping/**
          filters:
            - RewritePath=/apidocs/shipping/(?<remaining>.*), /${remaining}

        # ── Static Content (SPA) ────────────────────────────────
        # SPA(index.html)는 CDN 기반이므로 루트 경로만 member-service로 라우팅
        # catch-all(/**)을 쓰면 /swagger-ui/**, /webjars/** 등을 member-service로 넘겨
        # Spring Security가 403을 반환하므로 명시적 경로만 지정
        - id: member-static
          uri: http://member-service:8081
          predicates:
            - Path=/, /index.html, /favicon.ico

# Eureka: 현재 Docker Compose 환경에서는 비활성화 (Kubernetes 이관 시 lb:// 라우팅으로 전환)
eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:false}
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

# springdoc: gateway Swagger UI에서 5개 서비스 API 통합
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: member-service
        url: /apidocs/member/v3/api-docs
      - name: product-service
        url: /apidocs/product/v3/api-docs
      - name: order-service
        url: /apidocs/order/v3/api-docs
      - name: payment-service
        url: /apidocs/payment/v3/api-docs
      - name: shipping-service
        url: /apidocs/shipping/v3/api-docs
  api-docs:
    enabled: false   # gateway 자체 api-docs는 비활성화

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
