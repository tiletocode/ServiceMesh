server {
    listen 8080;

    # Docker 내부 DNS 동적 리졸버 (컨테이너 재시작 시 IP 변경 대응)
    resolver 127.0.0.11 valid=5s ipv6=off;

    # ── 프론트엔드 (member-service 정적 파일) ──────────────
    location / {
        set $upstream http://member-service:8081;
        proxy_pass         $upstream;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # ── member-service API ─────────────────────────────────
    location /api/v1/members {
        set $upstream http://member-service:8081;
        proxy_pass         $upstream;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # ── product-service API ────────────────────────────────
    location /api/v1/products {
        set $upstream http://product-service:8082;
        proxy_pass         $upstream;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # ── order-service API ──────────────────────────────────
    location /api/v1/orders {
        set $upstream http://order-service:8083;
        proxy_pass         $upstream;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # ── payment-service API ────────────────────────────────
    location /api/v1/payments {
        set $upstream http://payment-service:8084;
        proxy_pass         $upstream;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # ── shipping-service API ───────────────────────────────
    location /api/v1/shipments {
        set $upstream http://shipping-service:8085;
        proxy_pass         $upstream;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
    # ── admin reset (각 서비스별 경로로 분기) ─────────────────
    location /api/v1/admin/reset/member   { set $upstream http://member-service:8081;   proxy_pass $upstream/api/v1/admin/reset; proxy_set_header Host $host; }
    location /api/v1/admin/reset/product  { set $upstream http://product-service:8082;  proxy_pass $upstream/api/v1/admin/reset; proxy_set_header Host $host; }
    location /api/v1/admin/reset/order    { set $upstream http://order-service:8083;    proxy_pass $upstream/api/v1/admin/reset; proxy_set_header Host $host; }
    location /api/v1/admin/reset/payment  { set $upstream http://payment-service:8084;  proxy_pass $upstream/api/v1/admin/reset; proxy_set_header Host $host; }
    location /api/v1/admin/reset/shipping { set $upstream http://shipping-service:8085; proxy_pass $upstream/api/v1/admin/reset; proxy_set_header Host $host; }}
